<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="Gel.css">
</head>
<body>
    <section class="gallery-section">

    <h2 class="gallery-title">Hotel Gallery</h2>

    <!-- FILTER BUTTONS -->
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="rooms">Rooms</button>
        <button class="filter-btn" data-filter="food">Food</button>
        <button class="filter-btn" data-filter="exterior">Exterior</button>
    </div>

    <!-- GALLERY IMAGES -->
    <div class="gallery">

        <div class="gallery-item rooms">
            <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
        </div>

        <div class="gallery-item rooms">
            <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
        </div>

        <div class="gallery-item food">
            <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
        </div>

        <div class="gallery-item food">
            <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
        </div>

        <div class="gallery-item exterior">
            <img src="https://images.unsplash.com/photo-1501117716987-c8e1ecb21030">
        </div>

        <div class="gallery-item exterior">
            <img src="https://images.unsplash.com/photo-1445019980597-93fa8acb246c">
        </div>

    </div>

</section>

<script src="Gally.js"></script>
</body>
</html>
